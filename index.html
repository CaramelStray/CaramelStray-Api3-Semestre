<!DOCTYPE html>
<html lang="pt-BR" class="bg-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Funcionários</title>
    <!-- Usando Tailwind CSS para um design limpo e moderno sem precisar de um arquivo .css -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans antialiased text-gray-800">

    <div class="container mx-auto p-8 max-w-4xl">
        <h1 class="text-3xl font-bold mb-6 text-gray-700">Painel de Gestão de Funcionários</h1>

        <!-- Seção do Formulário para Adicionar/Editar Funcionário -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 id="form-title" class="text-2xl font-semibold mb-4">Adicionar Novo Funcionário</h2>
            <form id="form-funcionario" class="space-y-4">
                <!-- Inputs para os dados do funcionário -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="number" id="codigo" placeholder="Código" required class="p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-gray-200">
                    <input type="text" id="nome" placeholder="Nome Completo" required class="p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="email" id="email" placeholder="E-mail" required class="p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="cpf" placeholder="CPF" required class="p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="telefone" placeholder="Telefone" class="p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="number" id="codigo_perfil" placeholder="Código do Perfil" required class="p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex flex-col sm:flex-row gap-3">
                    <button id="submit-button" type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-md hover:bg-blue-700 transition-colors duration-300">
                        Salvar Funcionário
                    </button>
                    <button id="cancel-button" type="button" class="w-full bg-gray-500 text-white font-bold py-3 px-4 rounded-md hover:bg-gray-600 transition-colors duration-300 hidden">
                        Cancelar Edição
                    </button>
                </div>
            </form>
        </div>

        <!-- Seção da Tabela para Listar os Funcionários -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <h2 class="text-2xl font-semibold p-6">Funcionários Cadastrados</h2>
            <table class="min-w-full">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="text-left p-4 font-semibold">Nome</th>
                        <th class="text-left p-4 font-semibold">E-mail</th>
                        <th class="text-left p-4 font-semibold">CPF</th>
                        <th class="text-left p-4 font-semibold">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-funcionarios">
                    <!-- As linhas da tabela serão inseridas aqui pelo JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- ========= A MÁGICA DO JAVASCRIPT COMEÇA AQUI ========= -->
    <script>
        // --- Elementos do DOM ---
        const API_URL = 'http://localhost:8080/funcionarios';
        const form = document.getElementById('form-funcionario');
        const tabelaBody = document.getElementById('tabela-funcionarios');
        const formTitle = document.getElementById('form-title');
        const submitButton = document.getElementById('submit-button');
        const cancelButton = document.getElementById('cancel-button');
        
        // --- Variável de Estado ---
        let idEdicaoAtual = null;

        // --- FUNÇÕES PRINCIPAIS ---

        // 1. Buscar todos os funcionários na API e mostrar na tela
        async function fetchFuncionarios() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('A resposta da rede não foi bem-sucedida');
                const funcionarios = await response.json();
                
                tabelaBody.innerHTML = ''; // Limpa a tabela

                funcionarios.forEach(func => {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b hover:bg-gray-50';
                    
                    tr.innerHTML = `
                        <td class="p-4">${func.nome}</td>
                        <td class="p-4">${func.email}</td>
                        <td class="p-4">${func.cpf}</td>
                        <td class="p-4 whitespace-nowrap"></td>
                    `;

                    // Criar e adicionar botões de forma segura para evitar problemas com aspas
                    const actionsCell = tr.querySelector('td:last-child');
                    
                    const editButton = document.createElement('button');
                    editButton.innerText = 'Editar';
                    editButton.className = 'bg-yellow-500 text-white px-3 py-1 text-sm font-semibold rounded-md hover:bg-yellow-600 mr-2';
                    editButton.onclick = () => preencherFormularioParaEdicao(func);
                    actionsCell.appendChild(editButton);

                    const deleteButton = document.createElement('button');
                    deleteButton.innerText = 'Excluir';
                    deleteButton.className = 'bg-red-500 text-white px-3 py-1 text-sm font-semibold rounded-md hover:bg-red-600';
                    deleteButton.onclick = () => deleteFuncionario(func.codigo);
                    actionsCell.appendChild(deleteButton);
                    
                    tabelaBody.appendChild(tr);
                });

            } catch (error) {
                console.error('Falha na operação:', error);
                tabelaBody.innerHTML = `
                    <tr>
                        <td colspan="4" class="p-4 text-center text-red-600 font-semibold">
                            Erro ao conectar com a API.
                            <p class="font-normal text-sm text-gray-600 mt-1">
                                Verifique se a sua aplicação Java (backend) está em execução e se a anotação @CrossOrigin foi adicionada ao Controller.
                            </p>
                        </td>
                    </tr>
                `;
            }
        }

        // 2. Salvar (Criar ou Atualizar) um funcionário
        async function salvarFuncionario(event) {
            event.preventDefault();

            const funcionarioData = {
                codigo: document.getElementById('codigo').value,
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpf: document.getElementById('cpf').value,
                telefone: document.getElementById('telefone').value,
                perfil: {
                    codigo: document.getElementById('codigo_perfil').value
                },
                area: null
            };
            
            const isEditing = idEdicaoAtual !== null;
            const method = isEditing ? 'PUT' : 'POST';
            const url = isEditing ? `${API_URL}/${idEdicaoAtual}` : API_URL;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(funcionarioData),
                });

                if (!response.ok) throw new Error(`Erro ao ${isEditing ? 'atualizar' : 'salvar'} funcionário`);
                
                resetarFormulario();
                fetchFuncionarios();

            } catch (error) {
                console.error('Falha ao salvar:', error);
                alert(`Não foi possível salvar o funcionário. Verifique o console para mais detalhes.`);
            }
        }
        
        // 3. Deletar um funcionário
        async function deleteFuncionario(id) {
            if (!confirm(`Tem certeza que deseja excluir o funcionário de código ${id}?`)) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Erro ao deletar funcionário');
                fetchFuncionarios();
            } catch(error) {
                console.error('Falha ao deletar:', error);
                alert('Não foi possível deletar o funcionário.');
            }
        }

        // --- FUNÇÕES AUXILIARES ---

        // Preenche o formulário para edição
        function preencherFormularioParaEdicao(funcionario) {
            document.getElementById('codigo').value = funcionario.codigo;
            document.getElementById('codigo').disabled = true; // Não permite alterar o código
            document.getElementById('nome').value = funcionario.nome;
            document.getElementById('email').value = funcionario.email;
            document.getElementById('cpf').value = funcionario.cpf;
            document.getElementById('telefone').value = funcionario.telefone;
            document.getElementById('codigo_perfil').value = funcionario.perfil.codigo;

            formTitle.innerText = 'Editar Funcionário';
            submitButton.innerText = 'Atualizar Funcionário';
            submitButton.className = submitButton.className.replace('bg-blue-600 hover:bg-blue-700', 'bg-green-600 hover:bg-green-700');
            cancelButton.classList.remove('hidden');
            
            idEdicaoAtual = funcionario.codigo;
            form.scrollIntoView({ behavior: 'smooth' }); // Rola a tela para o formulário
        }

        // Reseta o formulário para o estado inicial (Adicionar)
        function resetarFormulario() {
            form.reset();
            document.getElementById('codigo').disabled = false;
            formTitle.innerText = 'Adicionar Novo Funcionário';
            submitButton.innerText = 'Salvar Funcionário';
            submitButton.className = submitButton.className.replace('bg-green-600 hover:bg-green-700', 'bg-blue-600 hover:bg-blue-700');
            cancelButton.classList.add('hidden');
            idEdicaoAtual = null;
        }

        // --- INICIALIZAÇÃO ---
        form.addEventListener('submit', salvarFuncionario);
        cancelButton.addEventListener('click', resetarFormulario);
        document.addEventListener('DOMContentLoaded', fetchFuncionarios);

    </script>
</body>
</html>
